<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IBK기업은행">
<title>IBK기업은행</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    background:#1c1c1e;
    color:#fff;
    font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    max-width:430px;
    margin:0 auto;
    position:relative;
    overflow:hidden;
    height:100%;
  }

  /* ---- 화면 전환 ---- */
  .screen {
    position:absolute; top:0; left:0;
    width:100%; height:100%;
    background:#1c1c1e;
    overflow-y:auto;
    transition:transform 0.32s cubic-bezier(.4,0,.2,1);
    -webkit-overflow-scrolling:touch;
  }
  .screen.slide-right { transform:translateX(100%); }
  .screen.slide-left  { transform:translateX(0); }

  /* ---- 상태바 숨김 ---- */
  .status-bar { display:none; }
  .tr-status { display:none; }

  /* ---- 메인 헤더 ---- */
  .main-header {
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 20px 14px;
  }
  .main-header-left {
    display:flex; align-items:center; gap:8px;
    font-size:18px; font-weight:700; color:#ebebf5cc;
  }
  .todo-icon {
    width:22px; height:22px; border:2px solid #ebebf5cc;
    border-radius:4px; display:flex; align-items:center; justify-content:center;
  }
  .todo-icon::before {
    content:''; display:block; width:10px; height:8px;
    border-left:2px solid #ebebf5cc; border-bottom:2px solid #ebebf5cc;
    transform:rotate(-45deg) translateY(-1px);
  }
  .main-header-right { display:flex; gap:20px; align-items:center; }
  .bell-icon { position:relative; }
  .bell-icon svg { width:24px; height:24px; fill:none; stroke:#ebebf5cc; stroke-width:1.8; }
  .bell-dot {
    position:absolute; top:-2px; right:-2px;
    width:8px; height:8px; background:#ff3b30; border-radius:50%;
    border:1.5px solid #1c1c1e;
  }
  .chat-icon svg { width:26px; height:26px; fill:none; stroke:#ebebf5cc; stroke-width:1.6; }
  .menu-icon { display:flex; flex-direction:column; gap:5px; cursor:pointer; }
  .menu-icon span { display:block; width:22px; height:2px; background:#ebebf5cc; border-radius:2px; }

  /* ---- 배너 ---- */
  .banner {
    margin:0 14px 14px;
    background:#2c2c2e;
    border-radius:14px;
    padding:16px 18px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .banner-text { font-size:16px; font-weight:700; line-height:1.5; }
  .banner-text strong { color:#fff; }
  .banner-text strong span { color:#4e8ef7; }
  .banner-mail {
    width:46px; height:38px; position:relative; flex-shrink:0;
  }
  .mail-body {
    width:46px; height:34px; background:#b0b8d0; border-radius:4px;
    position:absolute; bottom:0;
  }
  .mail-flap {
    width:0; height:0;
    border-left:23px solid transparent;
    border-right:23px solid transparent;
    border-top:18px solid #8a94b0;
    position:absolute; top:0; left:0;
  }

  /* ---- 계좌 카드 ---- */
  .account-section { margin:0 14px 12px; }
  .account-tabs { display:flex; }
  .tab {
    padding:10px 16px; font-size:14px; font-weight:600;
    border-radius:12px 12px 0 0; cursor:pointer;
    color:#8e8e93; background:#2c2c2e;
  }
  .tab.active { background:#3a3a3c; color:#fff; }

  .account-card {
    background:#3a3a3c;
    border-radius:0 12px 12px 12px;
    padding:18px 18px 16px;
    position:relative;
  }
  .three-dots {
    position:absolute; top:16px; right:16px;
    display:flex; flex-direction:column; gap:3px; cursor:pointer;
  }
  .three-dots span { display:block; width:4px; height:4px; border-radius:50%; background:#8e8e93; }

  .acct-name { font-size:15px; font-weight:700; margin-bottom:6px; line-height:1.4; }
  .acct-num {
    font-size:13px; color:#8e8e93; margin-bottom:18px;
    display:flex; align-items:center; gap:6px;
  }
  .copy-icon {
    display:inline-flex; align-items:center; justify-content:center;
    width:14px; height:14px; border:1.5px solid #8e8e93; border-radius:2px;
    position:relative;
  }
  .copy-icon::after {
    content:''; position:absolute; top:-3px; left:3px;
    width:10px; height:10px; border:1.5px solid #8e8e93;
    border-radius:2px; background:#3a3a3c;
  }

  .balance-row {
    display:flex; justify-content:flex-end; align-items:center; gap:8px;
    margin-bottom:14px;
  }
  .balance-amount { font-size:30px; font-weight:800; letter-spacing:-0.5px; }
  .balance-unit { font-size:20px; font-weight:700; }
  .refresh-btn {
    width:26px; height:26px; cursor:pointer; display:flex;
    align-items:center; justify-content:center;
  }
  .refresh-btn svg { width:22px; height:22px; stroke:#8e8e93; fill:none; stroke-width:2; }
  .refresh-btn.spin { animation:spin 0.5s ease; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .btn-row { display:flex; gap:10px; }
  .transfer-btn, .atm-btn {
    flex:1; padding:13px 0; border-radius:10px; border:none;
    font-size:15px; font-weight:700; cursor:pointer;
    background:#4e8ef7; color:#fff;
    font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;
  }
  .transfer-btn:active, .atm-btn:active { opacity:0.85; transform:scale(0.98); }

  /* ---- 페이지 도트 ---- */
  .page-dots { display:flex; justify-content:center; gap:6px; margin:12px 0 14px; }
  .pdot { width:22px; height:5px; border-radius:3px; background:#fff; }
  .pdot.off { width:5px; background:#48484a; }

  /* ---- 최근 이체내역 ---- */
  .recent-section {
    margin:0 14px 14px;
    background:#2c2c2e; border-radius:12px;
    padding:15px 18px;
    display:flex; justify-content:space-between; align-items:center;
    cursor:pointer;
  }
  .recent-title { font-size:15px; font-weight:700; }
  .chevron-down svg { width:18px; height:18px; stroke:#8e8e93; fill:none; stroke-width:2.5; }

  /* ---- 맞춤메뉴 ---- */
  .custom-title { font-size:16px; font-weight:700; padding:0 18px 12px; }
  .custom-grid {
    display:flex; gap:14px; padding:0 14px 16px;
    overflow-x:auto; scrollbar-width:none;
  }
  .custom-grid::-webkit-scrollbar { display:none; }
  .custom-item { display:flex; flex-direction:column; align-items:center; gap:8px; min-width:60px; }
  .custom-icon {
    width:56px; height:56px; background:#2c2c2e; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
  }
  .custom-icon svg { width:28px; height:28px; }
  .custom-label { font-size:12px; color:#ebebf5b3; white-space:nowrap; text-align:center; }

  .spacer { height:90px; }

  /* ---- 하단 탭바 ---- */
  .bottom-nav {
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:430px;
    background:#1c1c1e; border-top:1px solid #38383a;
    display:flex; padding:10px 0 22px; z-index:200;
  }
  .nav-item {
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    font-size:11px; color:#636366; cursor:pointer;
  }
  .nav-item.active { color:#4e8ef7; }
  .nav-item svg { width:24px; height:24px; fill:none; stroke:currentColor; stroke-width:1.7; }
  .nav-center-wrap {
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    cursor:pointer;
  }
  .nav-center-btn {
    width:50px; height:50px; background:#4e8ef7; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    margin-top:-18px;
    box-shadow:0 4px 16px rgba(78,142,247,0.5);
  }
  .nav-center-btn svg { width:26px; height:26px; fill:none; stroke:#fff; stroke-width:1.8; }
  .nav-center-label { font-size:11px; color:#4e8ef7; font-weight:700; }

  /* =========== 이체 화면 =========== */
  #transferScreen { background:#111113; }

  .tr-status {
    display:flex; justify-content:space-between; align-items:center;
    padding:16px 22px 6px;
    font-size:16px; font-weight:700;
  }
  .tr-header {
    display:flex; align-items:center;
    padding:10px 20px 18px; gap:6px;
  }
  .back-btn {
    display:flex; align-items:center; justify-content:center;
    width:32px; height:32px; cursor:pointer;
  }
  .back-btn svg { width:20px; height:20px; stroke:#fff; fill:none; stroke-width:2.5; }
  .tr-title { font-size:18px; font-weight:700; }
  .tr-cancel { margin-left:auto; font-size:15px; color:#fff; cursor:pointer; font-weight:400; }

  .tr-body { padding:6px 20px 0; }

  .tr-section-label { font-size:15px; font-weight:700; margin-bottom:14px; }

  .tr-from { display:flex; align-items:center; gap:10px; margin-bottom:5px; }
  .ibk-logo-sm {
    width:32px; height:32px; border-radius:50%;
    background:linear-gradient(135deg,#0d47a1,#1976d2,#42a5f5);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .ibk-logo-sm svg { width:18px; height:18px; }
  .tr-from-text { font-size:15px; font-weight:700; }
  .tr-from-chevron svg { width:14px; height:14px; stroke:#8e8e93; fill:none; stroke-width:2.5; }
  .tr-avail { font-size:13px; color:#8e8e93; padding-left:42px; margin-bottom:22px; }

  .tr-divider { height:1px; background:#2c2c2e; margin-bottom:22px; }

  .tr-to { display:flex; align-items:center; gap:10px; margin-bottom:28px; }
  .kb-logo-sm {
    width:32px; height:32px; border-radius:50%;
    background:#f5c400;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    font-size:11px; font-weight:900; color:#000;
  }
  .tr-to-text { font-size:15px; font-weight:700; }
  .tr-change { margin-left:auto; font-size:14px; color:#4e8ef7; font-weight:600; cursor:pointer; }

  .tr-amount-wrap { border-bottom:1.5px solid #38383a; padding-bottom:12px; margin-bottom:0; }
  .tr-amount-ph { font-size:22px; color:#48484a; font-weight:600; }

  .tr-flex-gap { min-height:150px; }

  .tr-usage {
    text-align:center; font-size:13px; color:#48484a;
    margin:20px 0 18px; cursor:pointer;
    text-decoration:underline; text-decoration-color:#48484a;
  }

  .tr-checkbox-row { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
  .tr-checkbox {
    width:22px; height:22px; border:1.5px solid #48484a;
    border-radius:5px; cursor:pointer; flex-shrink:0;
  }
  .tr-checkbox-label { font-size:15px; color:#ebebf5b3; }

  .tr-next-btn {
    width:100%; padding:16px; border-radius:14px; border:none;
    background:#2c2c2e; color:#636366;
    font-size:17px; font-weight:600; cursor:default; margin-bottom:34px;
    font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;
  }
</style>
</head>
<body>

<!-- ========== 메인 화면 ========== -->
<div class="screen slide-left" id="mainScreen">
  <!-- 상태바 -->
  <div class="status-bar">
    <span class="clock-el">14:25</span>
    <div class="sig-icons">
      <div class="sig-bars">
        <span></span><span></span><span></span><span></span>
      </div>
      <span class="wifi-icon">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <path d="M8 9.5a1 1 0 100 2 1 1 0 000-2z" fill="#fff"/>
          <path d="M5.17 7.17a4 4 0 015.66 0" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M2.34 4.34a8 8 0 0111.32 0" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </span>
      <div class="battery-wrap"><span>54</span></div>
    </div>
  </div>

  <!-- 헤더 -->
  <div class="main-header">
    <div class="main-header-left">
      할 일
      <div style="width:22px;height:22px;border:2px solid #ebebf5cc;border-radius:4px;display:flex;align-items:center;justify-content:center;">
        <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
          <rect x="0" y="0" width="12" height="2" rx="1" fill="#ebebf5cc"/>
          <rect x="0" y="4" width="8" height="2" rx="1" fill="#ebebf5cc"/>
          <rect x="0" y="8" width="10" height="2" rx="1" fill="#ebebf5cc"/>
        </svg>
      </div>
    </div>
    <div class="main-header-right">
      <div class="bell-icon">
        <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2H10c0 1.1.9 2 2 2zm6-6V11c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z" fill="#ebebf5cc"/></svg>
        <div class="bell-dot"></div>
      </div>
      <div class="chat-icon">
        <svg viewBox="0 0 26 26">
          <circle cx="13" cy="13" r="10" stroke="#ebebf5cc" stroke-width="1.6" fill="none"/>
          <circle cx="9" cy="13" r="1.2" fill="#ebebf5cc"/>
          <circle cx="13" cy="13" r="1.2" fill="#ebebf5cc"/>
          <circle cx="17" cy="13" r="1.2" fill="#ebebf5cc"/>
        </svg>
      </div>
      <div class="menu-icon"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- 배너 -->
  <div class="banner">
    <div class="banner-text">
      <strong><span>IBK</span>인증서 발급하고 경품<br>받아가세요!</strong>
    </div>
    <div class="banner-mail">
      <div class="mail-flap"></div>
      <div class="mail-body"></div>
    </div>
  </div>

  <!-- 계좌 카드 -->
  <div class="account-section">
    <div class="account-tabs">
      <div class="tab active">
        <span style="display:inline-flex;align-items:center;gap:6px;">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="9" fill="#1565c0"/>
            <path d="M5 9l3 3 5-5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          기업은행
        </span>
      </div>
      <div class="tab">다른금융</div>
    </div>
    <div class="account-card">
      <div class="three-dots"><span></span><span></span><span></span></div>
      <div class="acct-name">저축예금(IBK중기근로자급여파킹통장)</div>
      <div class="acct-num">
        341-127621-02-013
        <div class="copy-icon"></div>
      </div>
      <div class="balance-row">
        <div class="balance-amount" id="balanceAmt">4,019,957</div>
        <div class="balance-unit">원</div>
        <div class="refresh-btn" id="refreshBtn">
          <svg viewBox="0 0 22 22">
            <path d="M20 11A9 9 0 1111 2" stroke-linecap="round"/>
            <path d="M15 2l-4 4 4 4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div class="btn-row">
        <button class="transfer-btn" onclick="goTransfer()">이체</button>
        <button class="atm-btn">ATM출금</button>
      </div>
    </div>
  </div>

  <!-- 도트 -->
  <div class="page-dots">
    <div class="pdot"></div>
    <div class="pdot off"></div>
  </div>

  <!-- 최근 이체내역 -->
  <div class="recent-section">
    <span class="recent-title">최근 이체내역</span>
    <div class="chevron-down">
      <svg viewBox="0 0 18 18"><path d="M4 6l5 5 5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>

  <!-- 맞춤메뉴 -->
  <div class="custom-title">나만의 맞춤메뉴</div>
  <div class="custom-grid">
    <div class="custom-item">
      <div class="custom-icon">
        <svg viewBox="0 0 28 28" fill="none" width="28" height="28">
          <rect x="4" y="6" width="20" height="16" rx="2" stroke="#8e8ef0" stroke-width="1.8"/>
          <circle cx="14" cy="14" r="4" stroke="#8e8ef0" stroke-width="1.8"/>
          <path d="M4 10h20" stroke="#8e8ef0" stroke-width="1.5"/>
        </svg>
      </div>
      <span class="custom-label">전체계좌조회</span>
    </div>
    <div class="custom-item">
      <div class="custom-icon">
        <svg viewBox="0 0 28 28" fill="none" width="28" height="28">
          <path d="M14 4l2.5 7h7.5l-6 4.5 2.3 7-6.3-4.5L7.7 22.5 10 15.5 4 11h7.5z" stroke="#4e8ef7" stroke-width="1.6" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="custom-label">이벤트</span>
    </div>
    <div class="custom-item">
      <div class="custom-icon">
        <svg viewBox="0 0 28 28" fill="none" width="28" height="28">
          <path d="M14 4l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V8z" stroke="#4e8ef7" stroke-width="1.6" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="custom-label">i-ONE 가드</span>
    </div>
    <div class="custom-item">
      <div class="custom-icon">
        <svg viewBox="0 0 28 28" fill="none" width="28" height="28">
          <path d="M14 6v16M6 14h16" stroke="#636366" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="custom-label">추가</span>
    </div>
  </div>

  <div class="spacer"></div>

  <!-- 하단 탭바 -->
  <div class="bottom-nav">
    <div class="nav-item active">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke-linejoin="round"/><path d="M9 22V12h6v10"/></svg>
      <span>자산</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M8 10h8M8 14h5"/></svg>
      <span>상품</span>
    </div>
    <div class="nav-center-wrap">
      <div class="nav-center-btn">
        <svg viewBox="0 0 26 26">
          <path d="M5 13h16M13 5l8 8-8 8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="nav-center-label">톡톡송금</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/></svg>
      <span>혜택</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M3 17l4-8 4 5 3-3 4 6"/><path d="M3 21h18" stroke-linecap="round"/></svg>
      <span>주식</span>
    </div>
  </div>
</div>

<!-- ========== 이체 화면 ========== -->
<div class="screen slide-right" id="transferScreen">
  <!-- 상태바 -->
  <div class="tr-status">
    <span class="clock-el">14:25</span>
    <div class="sig-icons">
      <div class="sig-bars">
        <span></span><span></span><span></span><span></span>
      </div>
      <span class="wifi-icon">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <path d="M8 9.5a1 1 0 100 2 1 1 0 000-2z" fill="#fff"/>
          <path d="M5.17 7.17a4 4 0 015.66 0" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M2.34 4.34a8 8 0 0111.32 0" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </span>
      <div class="battery-wrap"><span>54</span></div>
    </div>
  </div>

  <!-- 헤더 -->
  <div class="tr-header">
    <div class="back-btn" onclick="goBack()">
      <svg viewBox="0 0 20 20"><path d="M13 4l-6 6 6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <span class="tr-title">이체</span>
    <span class="tr-cancel" onclick="goBack()">취소</span>
  </div>

  <div class="tr-body">
    <!-- 내 계좌에서 -->
    <div class="tr-section-label">내 계좌에서</div>
    <div class="tr-from">
      <div class="ibk-logo-sm">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M3 9l4 4 8-8" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="tr-from-text">기업 341-127621-02-013</span>
      <div class="tr-from-chevron">
        <svg viewBox="0 0 14 14"><path d="M3 5l4 4 4-4" stroke-linecap="round" stroke-linejoin="round"/></svg>

<script>
  function updateClock() {
    const now = new Date();
    const t = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    document.querySelectorAll('.clock-el').forEach(el => el.textContent = t);
  }
  updateClock();
  setInterval(updateClock, 1000);

  function goTransfer() {
    document.getElementById('mainScreen').classList.replace('slide-left','slide-right');
    document.getElementById('transferScreen').classList.replace('slide-right','slide-left');
  }
  function goBack() {
    document.getElementById('transferScreen').classList.replace('slide-left','slide-right');
    document.getElementById('mainScreen').classList.replace('slide-right','slide-left');
  }

  document.getElementById('refreshBtn').addEventListener('click', function() {
    this.classList.add('spin');
    setTimeout(() => this.classList.remove('spin'), 500);
  });
</script>
